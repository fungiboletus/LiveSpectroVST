[package]
name = "nice-plug-egui"
version = "0.1.5"
authors = [
    "Billy Messenger <billydm@noreply.codeberg.org>",
    "Robbert van der Helm <mail@robbertvanderhelm.nl>",
]
description = "An adapter to use egui GUIs with nice-plug"
edition = "2024"
license = "ISC"
repository = "https://codeberg.org/RustAudio/nice-plug"
keywords = ["gui", "nice-plug", "plugin", "clap", "vst3"]
categories = ["gui"]

[features]
default = ["opengl"]
opengl = ["egui-baseview/opengl"]
wgpu = ["egui-baseview/wgpu"]
## Enables a temporary workaround for keyboard input not working sometimes.
## See https://codeberg.org/RustAudio/egui-baseview/issues/20
keyboard_focus_workaround = ["egui-baseview/keyboard_focus_workaround"]

[dependencies]
raw-window-handle = "0.5"
nice-plug-core = "0.1.4"
egui = { version = "0.35.0", default-features = false, features = ["bytemuck"] }
egui-baseview = { version = "0.6.0", default-features = false, features = [
    "tracing",
] }
raw-window-handle-06 = { package = "raw-window-handle", version = "0.6" }
crossbeam = "0.8"
parking_lot = "0.12"
# To make the state persistable
serde = { version = "1.0", features = ["derive"] }
