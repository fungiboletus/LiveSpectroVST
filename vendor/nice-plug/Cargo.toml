description = "An audio plugin development framework that is nice to use :)"
readme = "README.md"
keywords = [
    "audio",
    "plugin",
    "clap",
    "vst",
    "vst3",
]
categories = ["multimedia::audio"]
license = "ISC"
repository = "https://codeberg.org/RustAudio/nice-plug"

[package.metadata.docs.rs]
all-features = true

[features]
