[package]
edition = "2024"
rust-version = "1.87"
name = "nice-plug"
version = "0.1.9"
authors = [
    "Robbert van der Helm <mail@robbertvanderhelm.nl>",
    "Billy Messenger <billydm@noreply.codeberg.org>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
