name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            command: cargo xtask bundle live-spectro-vst --release --locked
          - os: windows-latest
            platform: windows-x86_64
            command: cargo xtask bundle live-spectro-vst --release --locked
          - os: macos-latest
            platform: macos-universal
            command: cargo xtask bundle-universal live-spectro-vst --release --locked

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libx11-dev libxcb1-dev libx11-xcb-dev libxcb-dri2-0-dev libgl1-mesa-dev
          libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev
          libxcb-shape0-dev libxcb-xfixes0-dev

      - uses: dtolnay/rust-toolchain@1.92.0

      - name: Install macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: Swatinem/rust-cache@v2

      - name: Build bundles
        shell: bash
        run: ${{ matrix.command }}

      - name: Package bundles
        shell: bash
        run: bash scripts/package-release.sh "${{ matrix.platform }}"

      - uses: actions/upload-artifact@v4
        with:
          name: LiveSpectroVST-${{ matrix.platform }}
          path: target/dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: LiveSpectroVST-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
